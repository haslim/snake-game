<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sleek Snake & Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="glass-panel">
  <header>
    <h1>Snake <span class="neon-badge">PRO</span></h1>
    <div class="scores">
      <div class="score-card">
        <span class="label">SCORE</span>
        <span class="val" id="score">0</span>
      </div>
      <div class="score-card best">
        <span class="label">BEST</span>
        <span class="val" id="best">0</span>
      </div>
    </div>
  </header>
  
  <div class="game-container">
    <canvas id="game" width="480" height="480"></canvas>
    
    <!-- Leaderboard & Game Over Overlay -->
    <div id="game-overlay" class="overlay hidden">
      <div class="overlay-content glass-card">
        <div id="game-over-screen" class="screen">
          <h2 class="title-gameover">GAME OVER</h2>
          <p class="final-score-text">Your Score: <span id="final-score">0</span></p>
          
          <form id="score-form" class="score-submit-form">
            <input type="text" id="player-name" placeholder="Enter your name" maxlength="15" required autocomplete="off">
            <button type="submit" class="btn-submit">Submit Score</button>
          </form>
          
          <button id="overlay-restart" class="btn-restart">Play Again (R)</button>
        </div>

        <div id="leaderboard-screen" class="screen">
          <h3 class="title-leaderboard">🏆 Top Players</h3>
          <div class="leaderboard-list-wrapper">
            <table class="leaderboard-table">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Player</th>
                  <th>Score</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body">
                <!-- Dynamically populated -->
              </tbody>
            </table>
          </div>
          <button id="leaderboard-close" class="btn-secondary">Back to Game</button>
        </div>
      </div>
    </div>
  </div>

  <p id="status" class="status"></p>
  
  <div class="controls">
    <button id="restart" class="btn-action">Restart (R)</button>
    <label class="toggle"><input type="checkbox" id="wrap" checked><span class="toggle-slider"></span> Wrap Walls</label>
    <button id="show-leaderboard-btn" class="btn-action btn-secondary">Leaderboard 🏆</button>
  </div>
  
  <footer>Arrow keys / WASD &middot; Space to Pause &middot; R to Restart</footer>
</main>
<script src="app.js"></script>
</body>
</html>
